<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mangaka — Manga Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+JP:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
      defer
    ></script>
    <style>
      /* ── TOKENS ──────────────────────────────────────────────────── */
      :root {
        --ink: #0d0d0d;
        --paper: #f5f0e8;
        --paper-dark: #ede6d8;
        --accent: #e8472a;
        --accent-dark: #c93820;
        --accent-muted: rgba(232, 71, 42, 0.12);
        --gold: #c8a84b;
        --blue: #2a6ee8;
        --panel: #ffffff;
        --panel-border: rgba(13, 13, 13, 0.12);
        --text-muted: rgba(13, 13, 13, 0.45);
        --shadow-sm: 0 2px 8px rgba(13, 13, 13, 0.08);
        --shadow-md: 0 8px 32px rgba(13, 13, 13, 0.12);
        --shadow-lg: 0 24px 64px rgba(13, 13, 13, 0.18);
        --radius: 4px;
        --radius-lg: 8px;
      }

      /* ── RESET ───────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--paper);
        color: var(--ink);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── HALFTONE BG TEXTURE ─────────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(13, 13, 13, 0.04) 1px,
          transparent 1px
        );
        background-size: 20px 20px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── TYPOGRAPHY ──────────────────────────────────────────────── */
      .font-display {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 0.04em;
      }
      .font-jp {
        font-family: "Noto Serif JP", serif;
      }

      /* ── NAV ─────────────────────────────────────────────────────── */
      nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--ink);
        color: var(--paper);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        height: 58px;
        box-shadow: 0 2px 0 var(--accent);
      }

      .nav-logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.8rem;
        letter-spacing: 0.08em;
        color: var(--paper);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .nav-logo span.red {
        color: var(--accent);
      }
      .nav-logo .jp {
        font-family: "Noto Serif JP", serif;
        font-size: 0.85rem;
        color: var(--text-muted);
        color: rgba(245, 240, 232, 0.5);
        margin-top: 2px;
      }

      .nav-tabs {
        display: flex;
        gap: 0;
        height: 100%;
      }

      .nav-tab {
        height: 100%;
        display: flex;
        align-items: center;
        padding: 0 1.2rem;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(245, 240, 232, 0.6);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all 0.15s;
        user-select: none;
      }

      .nav-tab:hover {
        color: var(--paper);
      }
      .nav-tab.active {
        color: var(--paper);
        border-bottom-color: var(--accent);
      }

      .nav-user {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.85rem;
        color: rgba(245, 240, 232, 0.8);
      }

      .btn-sm {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 6px 14px;
        border-radius: var(--radius);
        border: none;
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn-ghost {
        background: transparent;
        color: rgba(245, 240, 232, 0.7);
        border: 1px solid rgba(245, 240, 232, 0.2);
      }
      .btn-ghost:hover {
        background: rgba(245, 240, 232, 0.08);
        color: var(--paper);
      }

      /* ── LAYOUT ──────────────────────────────────────────────────── */
      .page {
        position: relative;
        z-index: 1;
        min-height: calc(100vh - 58px);
      }

      .container {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      /* ── HERO / AUTH GATE ────────────────────────────────────────── */
      .auth-gate {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 58px);
        padding: 2rem;
      }

      .auth-card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-lg);
        padding: 2.5rem 3rem;
        width: 100%;
        max-width: 420px;
        box-shadow: var(--shadow-lg);
        position: relative;
        overflow: hidden;
      }

      .auth-card::before {
        content: attr(data-jp);
        position: absolute;
        top: -10px;
        right: -10px;
        font-family: "Noto Serif JP", serif;
        font-size: 6rem;
        color: rgba(13, 13, 13, 0.04);
        pointer-events: none;
        line-height: 1;
      }

      .auth-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        letter-spacing: 0.06em;
        margin-bottom: 0.25rem;
      }

      .auth-subtitle {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 2rem;
      }

      /* ── FORM ELEMENTS ───────────────────────────────────────────── */
      .form-group {
        margin-bottom: 1rem;
      }

      .form-label {
        display: block;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .form-input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid var(--panel-border);
        border-radius: var(--radius);
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        background: var(--paper);
        color: var(--ink);
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        outline: none;
      }

      .form-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-muted);
      }

      .form-input::placeholder {
        color: var(--text-muted);
      }

      textarea.form-input {
        resize: vertical;
        min-height: 80px;
      }

      select.form-input {
        appearance: none;
        cursor: pointer;
      }

      /* ── BUTTONS ─────────────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 20px;
        border-radius: var(--radius);
        border: none;
        font-family: "DM Sans", sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
        width: 100%;
      }
      .btn-primary:hover {
        background: var(--accent-dark);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: var(--ink);
        color: var(--paper);
      }
      .btn-secondary:hover {
        background: #2a2a2a;
      }

      .btn-outline {
        background: transparent;
        color: var(--ink);
        border: 1.5px solid var(--panel-border);
      }
      .btn-outline:hover {
        border-color: var(--ink);
        background: rgba(13, 13, 13, 0.04);
      }

      .btn-danger {
        background: transparent;
        color: var(--accent);
        border: 1.5px solid rgba(232, 71, 42, 0.3);
      }
      .btn-danger:hover {
        background: var(--accent);
        color: white;
      }

      .btn-icon {
        width: 34px;
        height: 34px;
        padding: 0;
        border-radius: var(--radius);
        background: transparent;
        border: 1.5px solid var(--panel-border);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        color: var(--text-muted);
      }
      .btn-icon:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      /* ── ALERTS ──────────────────────────────────────────────────── */
      .alert {
        padding: 10px 14px;
        border-radius: var(--radius);
        font-size: 0.875rem;
        margin-bottom: 1rem;
      }
      .alert-error {
        background: rgba(232, 71, 42, 0.1);
        color: var(--accent-dark);
        border-left: 3px solid var(--accent);
      }
      .alert-success {
        background: rgba(50, 180, 100, 0.1);
        color: #1a7a40;
        border-left: 3px solid #32b464;
      }

      /* ── DIVIDER ─────────────────────────────────────────────────── */
      .divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.5rem 0;
        color: var(--text-muted);
        font-size: 0.8rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--panel-border);
      }

      /* ── DASHBOARD ───────────────────────────────────────────────── */
      .dashboard {
        padding: 2rem 0 4rem;
      }

      .stats-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 1px;
        background: var(--panel-border);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        margin-bottom: 2.5rem;
        box-shadow: var(--shadow-sm);
      }

      .stat-item {
        background: var(--panel);
        padding: 1.2rem 1.5rem;
        text-align: center;
      }

      .stat-value {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        letter-spacing: 0.04em;
        color: var(--ink);
        line-height: 1;
      }
      .stat-value.accent {
        color: var(--accent);
      }
      .stat-value.gold {
        color: var(--gold);
      }
      .stat-value.blue {
        color: var(--blue);
      }

      .stat-label {
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-top: 4px;
      }

      /* ── SECTION HEADERS ─────────────────────────────────────────── */
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 1.2rem;
        border-bottom: 2px solid var(--ink);
        padding-bottom: 0.6rem;
      }

      .section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.6rem;
        letter-spacing: 0.04em;
      }

      .section-count {
        font-size: 0.8rem;
        color: var(--text-muted);
        font-weight: 500;
      }

      /* ── MANGA GRID ──────────────────────────────────────────────── */
      .manga-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1.25rem;
      }

      .manga-card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        cursor: pointer;
        transition:
          transform 0.18s,
          box-shadow 0.18s;
        position: relative;
      }

      .manga-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-md);
      }

      .manga-card-cover {
        width: 100%;
        aspect-ratio: 2/3;
        object-fit: cover;
        display: block;
        background: var(--paper-dark);
      }

      .manga-card-cover-placeholder {
        width: 100%;
        aspect-ratio: 2/3;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--paper-dark);
        font-family: "Noto Serif JP", serif;
        font-size: 2rem;
        color: var(--text-muted);
      }

      .manga-card-body {
        padding: 0.7rem 0.8rem 0.8rem;
      }

      .manga-card-title {
        font-size: 0.8rem;
        font-weight: 500;
        line-height: 1.3;
        margin-bottom: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .manga-card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }

      .status-badge {
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 2px 7px;
        border-radius: 2px;
      }

      .status-reading {
        background: rgba(42, 110, 232, 0.12);
        color: var(--blue);
      }
      .status-completed {
        background: rgba(50, 180, 100, 0.12);
        color: #1a7a40;
      }
      .status-plan_to_read {
        background: rgba(13, 13, 13, 0.08);
        color: var(--text-muted);
      }
      .status-on_hold {
        background: rgba(200, 168, 75, 0.15);
        color: #8a6f0f;
      }
      .status-dropped {
        background: rgba(232, 71, 42, 0.1);
        color: var(--accent);
      }

      .score-badge {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--gold);
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .fav-pin {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        background: var(--accent);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: white;
        box-shadow: 0 2px 6px rgba(232, 71, 42, 0.4);
      }

      /* ── SEARCH RESULT CARD ──────────────────────────────────────── */
      .search-card {
        display: flex;
        gap: 1rem;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-lg);
        padding: 1rem;
        transition: border-color 0.15s;
      }

      .search-card:hover {
        border-color: rgba(13, 13, 13, 0.25);
      }

      .search-card-img {
        width: 70px;
        height: 100px;
        object-fit: cover;
        border-radius: var(--radius);
        flex-shrink: 0;
        background: var(--paper-dark);
      }

      .search-card-body {
        flex: 1;
        min-width: 0;
      }

      .search-card-title {
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 4px;
        line-height: 1.35;
      }

      .search-card-eng {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .search-card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-bottom: 8px;
      }

      .tag {
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 2px;
        background: var(--paper-dark);
        color: var(--text-muted);
        border: 1px solid var(--panel-border);
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      .search-card-score {
        font-size: 0.8rem;
        color: var(--gold);
        font-weight: 600;
      }

      /* ── FILTER BAR ──────────────────────────────────────────────── */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }

      .filter-chip {
        padding: 5px 14px;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        cursor: pointer;
        border: 1.5px solid var(--panel-border);
        background: var(--panel);
        color: var(--text-muted);
        transition: all 0.15s;
        user-select: none;
      }

      .filter-chip:hover {
        border-color: var(--ink);
        color: var(--ink);
      }
      .filter-chip.active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      .search-input-wrap {
        flex: 1;
        max-width: 320px;
        position: relative;
      }

      .search-input-wrap input {
        padding-left: 36px;
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 0.9rem;
        pointer-events: none;
      }

      /* ── MODAL ───────────────────────────────────────────────────── */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(13, 13, 13, 0.7);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        backdrop-filter: blur(4px);
      }

      .modal {
        background: var(--panel);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 560px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--panel-border);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 1.5rem 0;
      }

      .modal-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.5rem;
        letter-spacing: 0.04em;
      }

      .modal-close {
        width: 32px;
        height: 32px;
        border: none;
        background: var(--paper);
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        transition: all 0.15s;
      }
      .modal-close:hover {
        background: var(--accent);
        color: white;
      }

      .modal-body {
        padding: 1.25rem 1.5rem 1.5rem;
      }

      .manga-detail-hero {
        display: flex;
        gap: 1.25rem;
        margin-bottom: 1.25rem;
      }

      .manga-detail-cover {
        width: 110px;
        height: 155px;
        object-fit: cover;
        border-radius: var(--radius);
        flex-shrink: 0;
        background: var(--paper-dark);
      }

      .manga-detail-info {
        flex: 1;
      }

      .manga-detail-title {
        font-weight: 600;
        font-size: 1rem;
        line-height: 1.35;
        margin-bottom: 4px;
      }

      .manga-detail-eng {
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .manga-detail-synopsis {
        font-size: 0.82rem;
        color: rgba(13, 13, 13, 0.7);
        line-height: 1.6;
        margin-bottom: 1rem;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      /* ── EMPTY STATE ─────────────────────────────────────────────── */
      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-muted);
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.4;
      }

      .empty-state-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.4rem;
        letter-spacing: 0.04em;
        color: var(--ink);
        opacity: 0.35;
        margin-bottom: 0.5rem;
      }

      .empty-state-sub {
        font-size: 0.85rem;
      }

      /* ── LOADING ─────────────────────────────────────────────────── */
      .spinner {
        width: 20px;
        height: 20px;
        border: 2.5px solid var(--panel-border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-row {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem;
        gap: 0.75rem;
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      /* ── SEARCH GRID ─────────────────────────────────────────────── */
      .search-results-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      @media (max-width: 640px) {
        .search-results-grid {
          grid-template-columns: 1fr;
        }
        .form-row {
          grid-template-columns: 1fr;
        }
        .manga-grid {
          grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        }
        nav {
          padding: 0 1rem;
        }
        .nav-tabs {
          display: none;
        }
        .auth-card {
          padding: 2rem 1.5rem;
        }
      }

      /* ── CHAPTER PROGRESS ────────────────────────────────────────── */
      .progress-bar {
        height: 3px;
        background: var(--paper-dark);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 4px;
      }

      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        transition: width 0.3s;
      }

      /* ── EDIT INLINE ─────────────────────────────────────────────── */
      .edit-panel {
        background: var(--paper);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        margin-bottom: 1rem;
      }

      /* ── TAB CONTENT TRANSITION ──────────────────────────────────── */
      [x-cloak] {
        display: none !important;
      }

      .fade-in {
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── TOOLTIP-LIKE STATUS SELECT ──────────────────────────────── */
      .select-with-icon {
        position: relative;
      }

      .select-with-icon::after {
        content: "▾";
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: var(--text-muted);
        font-size: 0.7rem;
      }

      /* ── SCORE STARS ─────────────────────────────────────────────── */
      .score-display {
        display: flex;
        align-items: center;
        gap: 3px;
        font-size: 0.75rem;
        color: var(--gold);
        font-weight: 600;
      }

      /* ── MANGA DETAIL PANEL (inline) ─────────────────────────────── */
      .inline-detail {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--shadow-sm);
      }
    </style>
  </head>

  <body x-data="app()" x-cloak>
    <!-- ── NAV ──────────────────────────────────────────────────────── -->
    <nav>
      <div class="nav-logo" @click="view = 'dashboard'">
        <span>Manga<span class="red">ka</span></span>
        <span class="jp">漫画家</span>
      </div>

      <div class="nav-tabs" x-show="auth.token">
        <div
          class="nav-tab"
          :class="{ active: view === 'dashboard' }"
          @click="view = 'dashboard'; loadMyList()"
        >
          My List
        </div>
        <div
          class="nav-tab"
          :class="{ active: view === 'search' }"
          @click="view = 'search'"
        >
          Discover
        </div>
        <div
          class="nav-tab"
          :class="{ active: view === 'favourites' }"
          @click="view = 'favourites'; loadMyList()"
        >
          Favourites
        </div>
      </div>

      <div class="nav-user">
        <template x-if="auth.token">
          <div style="display: flex; align-items: center; gap: 10px">
            <span
              style="font-size: 0.82rem; color: rgba(245, 240, 232, 0.6)"
              x-text="auth.user?.username"
            ></span>
            <button class="btn-sm btn-ghost" @click="logout()">Logout</button>
          </div>
        </template>
        <template x-if="!auth.token">
          <span style="font-size: 0.8rem; color: rgba(245, 240, 232, 0.4)"
            >Keep track of manga</span
          >
        </template>
      </div>
    </nav>

    <div class="page">
      <!-- ── AUTH GATE ──────────────────────────────────────────────── -->
      <template x-if="!auth.token">
        <div class="auth-gate">
          <div class="auth-card" data-jp="漫">
            <template x-if="!showRegister">
              <div class="fade-in">
                <div class="auth-title">Welcome Back</div>
                <div class="auth-subtitle">Sign in to your manga tracker</div>

                <div
                  x-show="authError"
                  class="alert alert-error"
                  x-text="authError"
                ></div>

                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input
                    class="form-input"
                    type="email"
                    x-model="loginForm.email"
                    placeholder="you@example.com"
                    @keydown.enter="login()"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">Password</label>
                  <input
                    class="form-input"
                    type="password"
                    x-model="loginForm.password"
                    placeholder="••••••••"
                    @keydown.enter="login()"
                  />
                </div>

                <button
                  class="btn btn-primary"
                  @click="login()"
                  :disabled="authLoading"
                  style="margin-top: 0.5rem"
                >
                  <span x-show="!authLoading">Sign In</span>
                  <span
                    x-show="authLoading"
                    style="display: flex; align-items: center; gap: 8px"
                    ><span
                      class="spinner"
                      style="width: 14px; height: 14px; border-width: 2px"
                    ></span>
                    Signing in…</span
                  >
                </button>

                <div class="divider">or</div>

                <button
                  class="btn btn-outline"
                  @click="showRegister = true; authError = ''"
                  style="width: 100%"
                >
                  Create Account
                </button>
              </div>
            </template>

            <template x-if="showRegister">
              <div class="fade-in">
                <div class="auth-title">Join Mangaka</div>
                <div class="auth-subtitle">Create your free account</div>

                <div
                  x-show="authError"
                  class="alert alert-error"
                  x-text="authError"
                ></div>
                <div
                  x-show="authSuccess"
                  class="alert alert-success"
                  x-text="authSuccess"
                ></div>

                <div class="form-group">
                  <label class="form-label">Username</label>
                  <input
                    class="form-input"
                    type="text"
                    x-model="registerForm.username"
                    placeholder="yourname"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">Email</label>
                  <input
                    class="form-input"
                    type="email"
                    x-model="registerForm.email"
                    placeholder="you@example.com"
                  />
                </div>
                <div class="form-group">
                  <label class="form-label">Password</label>
                  <input
                    class="form-input"
                    type="password"
                    x-model="registerForm.password"
                    placeholder="Min 8 characters"
                  />
                </div>

                <button
                  class="btn btn-primary"
                  @click="register()"
                  :disabled="authLoading"
                  style="margin-top: 0.5rem"
                >
                  <span x-show="!authLoading">Create Account</span>
                  <span
                    x-show="authLoading"
                    style="display: flex; align-items: center; gap: 8px"
                    ><span
                      class="spinner"
                      style="width: 14px; height: 14px; border-width: 2px"
                    ></span>
                    Creating…</span
                  >
                </button>

                <div class="divider">or</div>

                <button
                  class="btn btn-outline"
                  @click="showRegister = false; authError = ''; authSuccess = ''"
                  style="width: 100%"
                >
                  Back to Sign In
                </button>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- ── MAIN APP ────────────────────────────────────────────────── -->
      <template x-if="auth.token">
        <div>
          <!-- ── DASHBOARD (My List) ──────────────────────────────── -->
          <template x-if="view === 'dashboard' || view === 'favourites'">
            <div class="dashboard container fade-in">
              <!-- Stats Bar -->
              <div class="stats-bar" x-show="stats">
                <div class="stat-item">
                  <div class="stat-value" x-text="stats?.total ?? '—'"></div>
                  <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                  <div
                    class="stat-value blue"
                    x-text="stats?.reading ?? '—'"
                  ></div>
                  <div class="stat-label">Reading</div>
                </div>
                <div class="stat-item">
                  <div
                    class="stat-value"
                    style="color: #1a7a40"
                    x-text="stats?.completed ?? '—'"
                  ></div>
                  <div class="stat-label">Completed</div>
                </div>
                <div class="stat-item">
                  <div
                    class="stat-value"
                    x-text="stats?.plan_to_read ?? '—'"
                  ></div>
                  <div class="stat-label">Plan to Read</div>
                </div>
                <div class="stat-item">
                  <div
                    class="stat-value gold"
                    x-text="stats?.favourites ?? '—'"
                  ></div>
                  <div class="stat-label">Favourites</div>
                </div>
                <div class="stat-item">
                  <div
                    class="stat-value accent"
                    x-text="stats?.avg_score ? stats.avg_score.toFixed(1) : '—'"
                  ></div>
                  <div class="stat-label">Avg Score</div>
                </div>
              </div>

              <!-- Filter Bar -->
              <div class="filter-bar">
                <template x-if="view === 'dashboard'">
                  <div style="display: flex; gap: 6px; flex-wrap: wrap">
                    <span
                      class="filter-chip"
                      :class="{ active: listFilter === '' }"
                      @click="listFilter = ''"
                      >All</span
                    >
                    <span
                      class="filter-chip"
                      :class="{ active: listFilter === 'reading' }"
                      @click="listFilter = 'reading'"
                      >Reading</span
                    >
                    <span
                      class="filter-chip"
                      :class="{ active: listFilter === 'completed' }"
                      @click="listFilter = 'completed'"
                      >Completed</span
                    >
                    <span
                      class="filter-chip"
                      :class="{ active: listFilter === 'plan_to_read' }"
                      @click="listFilter = 'plan_to_read'"
                      >Plan to Read</span
                    >
                    <span
                      class="filter-chip"
                      :class="{ active: listFilter === 'on_hold' }"
                      @click="listFilter = 'on_hold'"
                      >On Hold</span
                    >
                    <span
                      class="filter-chip"
                      :class="{ active: listFilter === 'dropped' }"
                      @click="listFilter = 'dropped'"
                      >Dropped</span
                    >
                  </div>
                </template>

                <div class="search-input-wrap" style="margin-left: auto">
                  <span class="search-icon">🔍</span>
                  <input
                    class="form-input"
                    type="search"
                    placeholder="Filter my list…"
                    x-model="listSearch"
                    style="
                      font-size: 0.85rem;
                      padding-top: 7px;
                      padding-bottom: 7px;
                    "
                  />
                </div>
              </div>

              <!-- Section Header -->
              <div class="section-header">
                <div
                  class="section-title"
                  x-text="view === 'favourites' ? 'Favourites' : (listFilter ? listFilter.replace('_', ' ').toUpperCase() : 'ALL MANGA')"
                ></div>
                <div
                  class="section-count"
                  x-text="filteredList.length + ' titles'"
                ></div>
              </div>

              <!-- Loading -->
              <div class="loading-row" x-show="listLoading">
                <span class="spinner"></span> Loading your list…
              </div>

              <!-- Empty State -->
              <div
                class="empty-state"
                x-show="!listLoading && filteredList.length === 0"
              >
                <div class="empty-state-icon">📚</div>
                <div class="empty-state-title">Nothing Here Yet</div>
                <div class="empty-state-sub" x-show="myList.length === 0">
                  Go to <strong>Discover</strong> to add manga to your list
                </div>
                <div class="empty-state-sub" x-show="myList.length > 0">
                  No manga match this filter
                </div>
              </div>

              <!-- Manga Grid -->
              <div
                class="manga-grid"
                x-show="!listLoading && filteredList.length > 0"
              >
                <template x-for="entry in filteredList" :key="entry.id">
                  <div class="manga-card" @click="openEntryDetail(entry)">
                    <div x-show="entry.is_favourite" class="fav-pin">♥</div>

                    <template x-if="entry.cover_image">
                      <img
                        class="manga-card-cover"
                        :src="entry.cover_image"
                        :alt="entry.title"
                        loading="lazy"
                      />
                    </template>
                    <template x-if="!entry.cover_image">
                      <div class="manga-card-cover-placeholder">漫</div>
                    </template>

                    <!-- Progress bar -->
                    <template x-if="entry.total_chapters > 0">
                      <div class="progress-bar" style="margin: 0">
                        <div
                          class="progress-fill"
                          :style="`width:${Math.min(100,(entry.chapters_read/entry.total_chapters)*100)}%`"
                        ></div>
                      </div>
                    </template>

                    <div class="manga-card-body">
                      <div class="manga-card-title" x-text="entry.title"></div>
                      <div class="manga-card-meta">
                        <span
                          class="status-badge"
                          :class="'status-' + entry.status"
                          x-text="entry.status.replace('_',' ')"
                        ></span>
                        <span class="score-badge" x-show="entry.user_score">
                          ★ <span x-text="entry.user_score"></span>
                        </span>
                      </div>
                      <div
                        style="
                          font-size: 0.7rem;
                          color: var(--text-muted);
                          margin-top: 4px;
                        "
                        x-show="entry.total_chapters"
                      >
                        <span x-text="entry.chapters_read"></span> /
                        <span x-text="entry.total_chapters"></span> ch
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- ── DISCOVER (Search) ──────────────────────────────────── -->
          <template x-if="view === 'search'">
            <div class="dashboard container fade-in">
              <div class="section-header" style="margin-bottom: 1.5rem">
                <div class="section-title">Discover Manga</div>
              </div>

              <!-- Top Manga / Search -->
              <div class="filter-bar" style="margin-bottom: 1.5rem">
                <div class="search-input-wrap" style="max-width: 100%; flex: 1">
                  <span class="search-icon">🔍</span>
                  <input
                    class="form-input"
                    type="search"
                    placeholder="Search manga by title…"
                    x-model="searchQuery"
                    @input.debounce.400ms="searchManga()"
                    style="font-size: 0.9rem"
                  />
                </div>
                <button
                  class="btn btn-secondary"
                  @click="searchManga()"
                  style="flex-shrink: 0"
                >
                  Search
                </button>
              </div>

              <!-- Loading -->
              <div class="loading-row" x-show="searchLoading">
                <span class="spinner"></span> Searching…
              </div>

              <!-- Search Results -->
              <template x-if="!searchLoading && searchResults.length > 0">
                <div>
                  <div class="section-header">
                    <div
                      class="section-title"
                      x-text="searchQuery ? 'RESULTS' : 'TOP MANGA'"
                    ></div>
                    <div
                      class="section-count"
                      x-text="searchResults.length + ' titles'"
                    ></div>
                  </div>
                  <div class="search-results-grid">
                    <template
                      x-for="manga in searchResults"
                      :key="manga.mal_id"
                    >
                      <div class="search-card">
                        <img
                          class="search-card-img"
                          :src="manga.images?.jpg?.image_url || manga.images?.jpg?.small_image_url"
                          :alt="manga.title"
                          loading="lazy"
                        />
                        <div class="search-card-body">
                          <div
                            class="search-card-title"
                            x-text="manga.title"
                          ></div>
                          <div
                            class="search-card-eng"
                            x-text="manga.title_english || ''"
                          ></div>
                          <div class="search-card-tags">
                            <template
                              x-for="g in (manga.genres || []).slice(0,3)"
                              :key="g.mal_id"
                            >
                              <span class="tag" x-text="g.name"></span>
                            </template>
                            <span
                              class="tag"
                              x-show="manga.status"
                              x-text="manga.status"
                            ></span>
                          </div>
                          <div
                            style="
                              display: flex;
                              align-items: center;
                              justify-content: space-between;
                              gap: 6px;
                            "
                          >
                            <span class="search-card-score" x-show="manga.score"
                              >★ <span x-text="manga.score"></span
                            ></span>
                            <span
                              style="
                                font-size: 0.72rem;
                                color: var(--text-muted);
                              "
                              x-text="(manga.chapters ? manga.chapters + ' ch' : '?')"
                            ></span>
                            <button
                              class="btn"
                              style="
                                font-size: 0.72rem;
                                padding: 5px 10px;
                                flex-shrink: 0;
                              "
                              :class="isInList(manga.mal_id) ? 'btn-outline' : 'btn-secondary'"
                              @click="openAddModal(manga)"
                            >
                              <span
                                x-text="isInList(manga.mal_id) ? '✓ In List' : '+ Add'"
                              ></span>
                            </button>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </template>

              <!-- Empty search -->
              <div
                class="empty-state"
                x-show="!searchLoading && searchResults.length === 0 && searchQuery"
              >
                <div class="empty-state-icon">🔎</div>
                <div class="empty-state-title">No Results</div>
                <div class="empty-state-sub">Try a different search term</div>
              </div>
            </div>
          </template>
        </div>
      </template>
    </div>
    <!-- /page -->

    <!-- ── ADD TO LIST MODAL ────────────────────────────────────────── -->
    <template x-if="addModal.open">
      <div class="modal-backdrop" @click.self="addModal.open = false">
        <div class="modal">
          <div class="modal-header">
            <div class="modal-title">Add to List</div>
            <button class="modal-close" @click="addModal.open = false">
              ✕
            </button>
          </div>
          <div class="modal-body">
            <div class="manga-detail-hero">
              <img
                class="manga-detail-cover"
                :src="addModal.manga?.images?.jpg?.image_url"
                :alt="addModal.manga?.title"
              />
              <div class="manga-detail-info">
                <div
                  class="manga-detail-title"
                  x-text="addModal.manga?.title"
                ></div>
                <div
                  class="manga-detail-eng"
                  x-text="addModal.manga?.title_english || ''"
                ></div>
                <div
                  style="
                    display: flex;
                    gap: 6px;
                    flex-wrap: wrap;
                    margin-bottom: 8px;
                  "
                >
                  <template
                    x-for="g in (addModal.manga?.genres || []).slice(0,4)"
                    :key="g.mal_id"
                  >
                    <span class="tag" x-text="g.name"></span>
                  </template>
                </div>
                <div class="score-display" x-show="addModal.manga?.score">
                  ★ <span x-text="addModal.manga?.score"></span>
                  <span
                    style="color: var(--text-muted); font-weight: 400"
                    x-text="'(' + (addModal.manga?.scored_by || 0).toLocaleString() + ' votes)'"
                  ></span>
                </div>
              </div>
            </div>

            <div
              class="manga-detail-synopsis"
              x-text="addModal.manga?.synopsis || ''"
            ></div>

            <div
              x-show="addModal.error"
              class="alert alert-error"
              x-text="addModal.error"
            ></div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Status</label>
                <div class="select-with-icon">
                  <select class="form-input" x-model="addModal.form.status">
                    <option value="plan_to_read">Plan to Read</option>
                    <option value="reading">Reading</option>
                    <option value="completed">Completed</option>
                    <option value="on_hold">On Hold</option>
                    <option value="dropped">Dropped</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Your Score (0–10)</label>
                <input
                  class="form-input"
                  type="number"
                  min="0"
                  max="10"
                  step="0.5"
                  x-model.number="addModal.form.user_score"
                  placeholder="—"
                />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Chapters Read</label>
                <input
                  class="form-input"
                  type="number"
                  min="0"
                  x-model.number="addModal.form.chapters_read"
                  placeholder="0"
                />
              </div>
              <div
                class="form-group"
                style="display: flex; align-items: flex-end; gap: 8px"
              >
                <label
                  style="
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    cursor: pointer;
                    padding-bottom: 10px;
                  "
                >
                  <input
                    type="checkbox"
                    x-model="addModal.form.is_favourite"
                    style="
                      width: 16px;
                      height: 16px;
                      accent-color: var(--accent);
                    "
                  />
                  <span style="font-size: 0.85rem">Add to Favourites ♥</span>
                </label>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Notes</label>
              <textarea
                class="form-input"
                x-model="addModal.form.notes"
                placeholder="Personal notes…"
              ></textarea>
            </div>

            <div
              style="
                display: flex;
                gap: 0.75rem;
                justify-content: flex-end;
                margin-top: 0.5rem;
              "
            >
              <button class="btn btn-outline" @click="addModal.open = false">
                Cancel
              </button>
              <button
                class="btn btn-secondary"
                @click="addToList()"
                :disabled="addModal.loading"
              >
                <span x-show="!addModal.loading">Add to List</span>
                <span
                  x-show="addModal.loading"
                  style="display: flex; align-items: center; gap: 6px"
                  ><span
                    class="spinner"
                    style="width: 13px; height: 13px; border-width: 2px"
                  ></span>
                  Adding…</span
                >
              </button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ── ENTRY DETAIL MODAL ────────────────────────────────────────── -->
    <template x-if="entryModal.open">
      <div class="modal-backdrop" @click.self="entryModal.open = false">
        <div class="modal">
          <div class="modal-header">
            <div
              class="modal-title"
              x-text="entryModal.entry?.title?.slice(0,28) + (entryModal.entry?.title?.length > 28 ? '…' : '')"
            ></div>
            <button class="modal-close" @click="entryModal.open = false">
              ✕
            </button>
          </div>
          <div class="modal-body">
            <div class="manga-detail-hero">
              <template x-if="entryModal.entry?.cover_image">
                <img
                  class="manga-detail-cover"
                  :src="entryModal.entry.cover_image"
                  :alt="entryModal.entry.title"
                />
              </template>
              <template x-if="!entryModal.entry?.cover_image">
                <div
                  class="manga-detail-cover"
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    background: var(--paper-dark);
                    font-size: 2.5rem;
                    color: var(--text-muted);
                  "
                >
                  漫
                </div>
              </template>
              <div class="manga-detail-info">
                <div
                  class="manga-detail-title"
                  x-text="entryModal.entry?.title"
                ></div>
                <div
                  class="manga-detail-eng"
                  x-text="entryModal.entry?.title_english || ''"
                ></div>
                <div style="margin-bottom: 8px">
                  <span
                    class="status-badge"
                    :class="'status-' + entryModal.entry?.status"
                    x-text="entryModal.entry?.status?.replace('_',' ')"
                  ></span>
                </div>
                <div
                  style="
                    font-size: 0.8rem;
                    color: var(--text-muted);
                    line-height: 1.8;
                  "
                >
                  <div x-show="entryModal.entry?.author">
                    ✍️ <span x-text="entryModal.entry?.author"></span>
                  </div>
                  <div x-show="entryModal.entry?.mal_score">
                    🌐 MAL Score:
                    <span
                      class="score-display"
                      style="display: inline-flex"
                      x-text="entryModal.entry?.mal_score"
                    ></span>
                  </div>
                  <div x-show="entryModal.entry?.genres">
                    🏷 <span x-text="entryModal.entry?.genres"></span>
                  </div>
                </div>
              </div>
            </div>

            <div
              class="manga-detail-synopsis"
              x-text="entryModal.entry?.synopsis || ''"
              style="-webkit-line-clamp: 3"
            ></div>

            <!-- Edit form -->
            <div class="edit-panel">
              <div
                style="
                  font-size: 0.7rem;
                  font-weight: 600;
                  letter-spacing: 0.1em;
                  text-transform: uppercase;
                  color: var(--text-muted);
                  margin-bottom: 0.75rem;
                "
              >
                Your Progress
              </div>

              <div
                x-show="entryModal.error"
                class="alert alert-error"
                x-text="entryModal.error"
              ></div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Status</label>
                  <div class="select-with-icon">
                    <select class="form-input" x-model="entryModal.form.status">
                      <option value="plan_to_read">Plan to Read</option>
                      <option value="reading">Reading</option>
                      <option value="completed">Completed</option>
                      <option value="on_hold">On Hold</option>
                      <option value="dropped">Dropped</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Score (0–10)</label>
                  <input
                    class="form-input"
                    type="number"
                    min="0"
                    max="10"
                    step="0.5"
                    x-model.number="entryModal.form.user_score"
                    placeholder="—"
                  />
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Chapters Read</label>
                  <input
                    class="form-input"
                    type="number"
                    min="0"
                    x-model.number="entryModal.form.chapters_read"
                    placeholder="0"
                  />
                </div>
                <div
                  class="form-group"
                  style="display: flex; align-items: flex-end"
                >
                  <label
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      cursor: pointer;
                      padding-bottom: 10px;
                    "
                  >
                    <input
                      type="checkbox"
                      x-model="entryModal.form.is_favourite"
                      style="
                        width: 16px;
                        height: 16px;
                        accent-color: var(--accent);
                      "
                    />
                    <span style="font-size: 0.85rem">Favourite ♥</span>
                  </label>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea
                  class="form-input"
                  x-model="entryModal.form.notes"
                  placeholder="Personal notes…"
                  style="min-height: 60px"
                ></textarea>
              </div>
            </div>

            <div
              style="
                display: flex;
                gap: 0.75rem;
                justify-content: space-between;
              "
            >
              <button
                class="btn btn-danger"
                @click="deleteEntry(entryModal.entry.id)"
              >
                Remove
              </button>
              <div style="display: flex; gap: 0.75rem">
                <button
                  class="btn btn-outline"
                  @click="entryModal.open = false"
                >
                  Cancel
                </button>
                <button
                  class="btn btn-secondary"
                  @click="updateEntry()"
                  :disabled="entryModal.loading"
                >
                  <span x-show="!entryModal.loading">Save Changes</span>
                  <span
                    x-show="entryModal.loading"
                    style="display: flex; align-items: center; gap: 6px"
                    ><span
                      class="spinner"
                      style="width: 13px; height: 13px; border-width: 2px"
                    ></span>
                    Saving…</span
                  >
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script>
      const API = "https://mangaka.onrender.com";

      function getAuthHeaders() {
        const token = localStorage.getItem("manga-token");
        return token ? { Authorization: `Bearer ${token}` } : {};
      }

      function app() {
        return {
          /* ── AUTH STATE ────────────────────────────────────────────── */
          auth: { token: localStorage.getItem("manga-token"), user: null },
          showRegister: false,
          loginForm: { email: "", password: "" },
          registerForm: { username: "", email: "", password: "" },
          authLoading: false,
          authError: "",
          authSuccess: "",

          /* ── VIEW ─────────────────────────────────────────────────── */
          view: "dashboard",

          /* ── MY LIST ──────────────────────────────────────────────── */
          myList: [],
          listLoading: false,
          listFilter: "",
          listSearch: "",
          stats: null,

          /* ── SEARCH ───────────────────────────────────────────────── */
          searchQuery: "",
          searchResults: [],
          searchLoading: false,

          /* ── MODALS ───────────────────────────────────────────────── */
          addModal: {
            open: false,
            manga: null,
            loading: false,
            error: "",
            form: {
              status: "plan_to_read",
              chapters_read: 0,
              user_score: null,
              is_favourite: false,
              notes: "",
            },
          },
          entryModal: {
            open: false,
            entry: null,
            loading: false,
            error: "",
            form: {
              status: "plan_to_read",
              chapters_read: 0,
              user_score: null,
              is_favourite: false,
              notes: "",
            },
          },

          /* ── COMPUTED ─────────────────────────────────────────────── */
          get filteredList() {
            let list =
              this.view === "favourites"
                ? this.myList.filter((e) => e.is_favourite)
                : this.myList;
            if (this.listFilter)
              list = list.filter((e) => e.status === this.listFilter);
            if (this.listSearch) {
              const q = this.listSearch.toLowerCase();
              list = list.filter(
                (e) =>
                  e.title.toLowerCase().includes(q) ||
                  (e.title_english || "").toLowerCase().includes(q),
              );
            }
            return list;
          },

          /* ── INIT ─────────────────────────────────────────────────── */
          async init() {
            const token = localStorage.getItem("manga-token");
            if (token) {
              this.auth.token = token;
              await this.fetchMe();
              await this.loadMyList();
              await this.loadTop();
            }
          },

          /* ── AUTH ─────────────────────────────────────────────────── */
          async login() {
            this.authLoading = true;
            this.authError = "";
            try {
              const r = await fetch(`${API}/api/token`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(this.loginForm),
              });
              const data = await r.json();
              if (!r.ok) throw new Error(data.detail || "Login failed");
              localStorage.setItem("manga-token", data.access_token);
              this.auth.token = data.access_token;
              await this.fetchMe();
              await this.loadMyList();
              await this.loadTop();
              this.loginForm = { email: "", password: "" };
            } catch (e) {
              this.authError = e.message;
            } finally {
              this.authLoading = false;
            }
          },

          async register() {
            this.authLoading = true;
            this.authError = "";
            this.authSuccess = "";
            try {
              const r = await fetch(`${API}/api/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(this.registerForm),
              });
              const data = await r.json();
              if (!r.ok) throw new Error(data.detail || "Registration failed");
              this.authSuccess = "Account created! You can now sign in.";
              this.registerForm = { username: "", email: "", password: "" };
              setTimeout(() => {
                this.showRegister = false;
                this.authSuccess = "";
              }, 2000);
            } catch (e) {
              this.authError = e.message;
            } finally {
              this.authLoading = false;
            }
          },

          async fetchMe() {
            try {
              const token = localStorage.getItem("manga-token");
              if (!token) return;

              const r = await fetch(`${API}/api/me`, {
                headers: { Authorization: `Bearer ${token}` },
              });
              if (r.ok) {
                this.auth.user = await r.json();
              } else if (r.status === 401) {
                this.logout();
              }
            } catch (e) {
              console.error("Fetch user error:", e);
            }
          },

          logout() {
            localStorage.removeItem("manga-token");
            this.auth = { token: null, user: null };
            this.myList = [];
            this.stats = null;
            this.searchResults = [];
            this.view = "dashboard";
          },

          /* ── MY LIST ──────────────────────────────────────────────── */
          async loadMyList() {
            const token = localStorage.getItem("manga-token");
            if (!token) return;

            this.listLoading = true;
            try {
              const r = await fetch(`${API}/api/manga`, {
                headers: { Authorization: `Bearer ${token}` },
              });
              if (r.ok) {
                this.myList = await r.json();
              }
            } catch (e) {
              console.error("Load list error:", e);
            } finally {
              this.listLoading = false;
            }
            this.loadStats();
          },

          async loadStats() {
            const token = localStorage.getItem("manga-token");
            if (!token) return;

            try {
              const r = await fetch(`${API}/api/stats`, {
                headers: { Authorization: `Bearer ${token}` },
              });
              if (r.ok) {
                this.stats = await r.json();
              }
            } catch (e) {
              console.error("Load stats error:", e);
            }
          },

          isInList(malId) {
            return this.myList.some((e) => e.mal_id === malId);
          },

          /* ── SEARCH ───────────────────────────────────────────────── */
          async loadTop() {
            if (this.searchResults.length > 0) return;
            this.searchLoading = true;
            try {
              const r = await fetch(`${API}/api/jikan/top?page=1`);
              if (r.ok) {
                const d = await r.json();
                this.searchResults = d.data || [];
              }
            } catch (e) {
              console.error("Load top error:", e);
            } finally {
              this.searchLoading = false;
            }
          },

          async searchManga() {
            if (!this.searchQuery.trim()) {
              this.loadTop();
              return;
            }
            this.searchLoading = true;
            try {
              const r = await fetch(
                `${API}/api/jikan/search?q=${encodeURIComponent(this.searchQuery)}`,
              );
              if (r.ok) {
                const d = await r.json();
                this.searchResults = d.data || [];
              }
            } catch (e) {
              console.error("Search error:", e);
            } finally {
              this.searchLoading = false;
            }
          },

          /* ── ADD TO LIST ──────────────────────────────────────────── */
          openAddModal(manga) {
            if (this.isInList(manga.mal_id)) {
              const entry = this.myList.find((e) => e.mal_id === manga.mal_id);
              if (entry) this.openEntryDetail(entry);
              return;
            }
            this.addModal = {
              open: true,
              manga,
              loading: false,
              error: "",
              form: {
                status: "plan_to_read",
                chapters_read: 0,
                user_score: null,
                is_favourite: false,
                notes: "",
              },
            };
          },

          async addToList() {
            this.addModal.loading = true;
            this.addModal.error = "";
            const m = this.addModal.manga;
            const token = localStorage.getItem("manga-token");

            const genres = (m.genres || []).map((g) => g.name).join(", ");
            const authors = (m.authors || []).map((a) => a.name).join(", ");

            try {
              const r = await fetch(`${API}/api/manga`, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Authorization: `Bearer ${token}`,
                },
                body: JSON.stringify({
                  mal_id: m.mal_id,
                  title: m.title,
                  title_english: m.title_english || null,
                  cover_image: m.images?.jpg?.image_url || null,
                  manga_status: m.status || null,
                  genres: genres || null,
                  mal_score: m.score || null,
                  synopsis: m.synopsis || null,
                  author: authors || null,
                  total_chapters: m.chapters || null,
                  status: this.addModal.form.status,
                  chapters_read: this.addModal.form.chapters_read,
                  user_score: this.addModal.form.user_score,
                  is_favourite: this.addModal.form.is_favourite,
                  notes: this.addModal.form.notes,
                }),
              });
              const data = await r.json();
              if (!r.ok) throw new Error(data.detail || "Failed to add");
              this.myList.unshift(data);
              this.loadStats();
              this.addModal.open = false;
            } catch (e) {
              this.addModal.error = e.message;
              console.error("Add to list error:", e);
            } finally {
              this.addModal.loading = false;
            }
          },

          /* ── ENTRY DETAIL ─────────────────────────────────────────── */
          openEntryDetail(entry) {
            this.entryModal = {
              open: true,
              entry,
              loading: false,
              error: "",
              form: {
                status: entry.status,
                chapters_read: entry.chapters_read,
                user_score: entry.user_score,
                is_favourite: entry.is_favourite,
                notes: entry.notes || "",
              },
            };
          },

          async updateEntry() {
            this.entryModal.loading = true;
            this.entryModal.error = "";
            const token = localStorage.getItem("manga-token");

            try {
              const r = await fetch(
                `${API}/api/manga/${this.entryModal.entry.id}`,
                {
                  method: "PUT",
                  headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`,
                  },
                  body: JSON.stringify({
                    status: this.entryModal.form.status,
                    chapters_read: this.entryModal.form.chapters_read,
                    user_score: this.entryModal.form.user_score,
                    is_favourite: this.entryModal.form.is_favourite,
                    notes: this.entryModal.form.notes,
                  }),
                },
              );
              const data = await r.json();
              if (!r.ok) throw new Error(data.detail || "Update failed");
              const idx = this.myList.findIndex((e) => e.id === data.id);
              if (idx > -1) this.myList[idx] = data;
              this.loadStats();
              this.entryModal.open = false;
            } catch (e) {
              this.entryModal.error = e.message;
            } finally {
              this.entryModal.loading = false;
            }
          },

          async deleteEntry(id) {
            if (!confirm("Remove this manga from your list?")) return;
            const token = localStorage.getItem("manga-token");

            try {
              const r = await fetch(`${API}/api/manga/${id}`, {
                method: "DELETE",
                headers: { Authorization: `Bearer ${token}` },
              });
              if (r.ok || r.status === 204) {
                this.myList = this.myList.filter((e) => e.id !== id);
                this.loadStats();
                this.entryModal.open = false;
              }
            } catch (e) {
              console.error("Delete error:", e);
            }
          },
        };
      }
    </script>
  </body>
</html>
